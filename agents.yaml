# AGENTS-OS Swarm Role Registry
project: agents-os-core
version: 4.0

roles:
  gem:
    name: GEM (Gemini Engine Master)
    model: Gemini 3.5 Flash (High)
    description: Global coordinator overseeing core repo operations and installer health.
    constraints:
      - Strictly follow the terminal-only file manipulation rule (bypass File Edit Tool bug).
      - Maintain standard structure across environments.

  coordinator:
    name: Coordinator
    model: Gemini 3.5 Flash (High)
    description: High-level orchestration, git push, plan management.

  builder:
    name: Builder
    model: Claude Sonnet 4.6 (Thinking)
    description: Structural implementation and codebase execution.

  auditor:
    name: Auditor
    model: Gemini 3.5 Flash (Low)
    description: Verifies file formats, syntax validity, path integrity, and snap sandbox issues.
